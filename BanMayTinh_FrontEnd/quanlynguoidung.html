<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng</title>
    <link rel="stylesheet" href="./assets/fonts/fontawesome-free-6.6.0-web/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/admin.css">
    <link rel="stylesheet" href="./assets/css/QL.css">
</head>
<body>
    <div class="container pd-20">
        <div class="header">
            <h1>Quản Lý Người Dùng</h1>
            <div class="actions">
                <button class="btn-add" id="open-add-modal"><i class="fa fa-plus"></i> Thêm người dùng</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="search" placeholder="Tìm kiếm theo tên, email...">
            <button id="search-btn"><i class="fa fa-search"></i></button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Ảnh</th>
                    <th>UserID</th>
                    <th>UserName</th>
                    <th>Pass</th>
                    <th>Họ Tên</th>
                    <th>Email</th>
                    <th>SĐT</th>
                    <th>Vai Trò</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="user-table">
                <tr>
                    <td><img src="https://cdn.pixabay.com/photo/2020/07/01/12/58/icon-5359553_1280.png" alt="Avatar" class="avatar"></td>
                    <td>U001</td>
                    <td>john_doe</td>
                    <td>123</td>
                    <td>John Doe</td>
                    <td>john.doe@example.com</td>
                    <td>0123456789</td>
                    <td>Admin</td>
                    <td>
                        <button class="btn-edit" data-id="U001"><i class="fa fa-edit"></i> Sửa</button>
                        <button class="btn-delete" data-id="U001"><i class="fa fa-trash"></i> Xóa</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div class="modal" id="user-modal">
        <div class="modal-content">
            <button class="modal-close" id="close-modal">&times;</button>
            <h2>Thông Tin Người Dùng</h2>
            <form id="user-form">
                <label for="avatar">Tải Ảnh</label>
                <input type="file" id="avatar-upload" accept="image/*">
                <img id="avatar-preview" src="" alt="Ảnh xem trước" style="max-width: 100px; display: none;">

                <label for="user-id">UserID</label>
                <input type="text" id="user-id" name="user-id" disabled>

                <label for="username">UserName</label>
                <input type="text" id="username" name="username" required placeholder="Nhập username">

                <label for="fullname">Họ Tên</label>
                <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên">

                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Nhập email">

                <label for="phone">SĐT</label>
                <input type="text" id="phone" name="phone" placeholder="Nhập số điện thoại">

                <label for="role">Vai Trò</label>
                <select id="role" name="role">
                    <option value="Admin">Admin</option>
                    <option value="User">User</option>
                </select>

                <div class="modal-actions">
                    <button type="button" class="btn-save">Lưu</button>
                    <button type="button" class="btn-cancel" id="cancel-modal">Hủy</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
