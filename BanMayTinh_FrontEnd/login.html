<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTGShop, PC Cao Cấp, PC đẹp hiệu năng cao</title>
    <link rel="stylesheet" href="./assets/fonts/fontawesome-free-6.6.0-web/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>
    <!-- Begin Modal -->
    <div class="modal">
        <div class="modal__overlay"></div>
        <div class="modal__body">
            <!-- Login form -->
            <div class="auth-form" id="login-form">
                <div class="auth-form__container">
                    <div class="auth-form__header">
                        <h3 class="auth-form__heading">Đăng nhập</h3>
                    </div>
                    <div class="auth-form__form">
                        <div class="auth-form__group">
                            <input type="text" class="auth-form__input" placeholder="Email/Số điện thoại/Tên đăng nhập">
                        </div>
                        <div class="auth-form__group">
                            <input type="password" class="auth-form__input" id="login-password" placeholder="Mật khẩu">
                            <button type="button" class="password-toggle" onclick="togglePassword('login-password', 'eye-icon-login')">
                                <i class="fa-solid fa-eye" id="eye-icon-login"></i>
                            </button>
                        </div>
                    </div>
                    <div class="auth-form__controls auth-form__controls--login">
                        <button class="btn btn--normal upper-text auth-form__controls-back" onclick="toggleForms(event)">trở lại</button>
                        <button class="btn btn--primary upper-text">đăng nhập</button>
                    </div>
                    <div class="auth-form__aside">
                        <div class="auth-form__help">
                            <a href="" class="auth-form__help-link">Quên mật khẩu</a>
                            <a href="" class="auth-form__help-link">Đăng nhập với SMS</a>
                        </div>
                    </div>
                    <div class="auth-form__sup">
                        <div class="auth-form__sup-text">
                            <div class="hr-bar"></div>
                            <div class="text-or upper-text">hoặc</div>
                            <div class="hr-bar"></div>
                        </div>
                        <div class="auth-form__sup-socials">
                            <a href="" class="auth-form__sup-socials--facebook btn btn--with--icon">
                                <i class="auth-form__sup-socials-icon fa-brands fa-square-facebook"></i>
                                <span class="auth-form__sup-socials-title">Facebook</span>
                            </a>
                            <a href="" class="auth-form__sup-socials--google btn btn--size-s btn--with--icon">
                                <i class="auth-form__sup-socials-icon fa-brands fa-google"></i>
                                <span class="auth-form__sup-socials-title">Google</span>
                            </a>
                        </div>
                    </div>
                    <div class="auth-form__footer">
                        <div class="auth-form__footer-sup">
                            <span class="auth-form__footer-sup-text">Bạn mới biết đến TTGShop?</span>
                            <a class="auth-form__login" href="" onclick="toggleForms(event)">Đăng ký</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Register form -->
            <div class="auth-form" id="register-form">
                <div class="auth-form__container">
                    <div class="auth-form__header">
                        <h3 class="auth-form__heading">Đăng ký</h3>
                    </div>
                    <div class="auth-form__form">
                        <div class="auth-form__group">
                            <input type="email" class="auth-form__input" placeholder="Email">
                        </div>
                        <div class="auth-form__group">
                            <input type="text" class="auth-form__input" placeholder="Tên đăng nhập">
                        </div>
                        <div class="auth-form__group">
                            <input type="password" class="auth-form__input" id="register-password" placeholder="Mật khẩu">
                            <button type="button" class="password-toggle" onclick="togglePassword('register-password', 'eye-icon-register')">
                                <i class="fa-solid fa-eye" id="eye-icon-register"></i>
                            </button>
                        </div>
                        <div class="auth-form__group">
                            <input type="password" class="auth-form__input" id="confirm-password" placeholder="Nhập lại mật khẩu">
                            <button type="button" class="password-toggle" onclick="togglePassword('confirm-password', 'eye-icon-confirm')">
                                <i class="fa-solid fa-eye" id="eye-icon-confirm"></i>
                            </button>
                        </div>
                    </div>
                    <div class="auth-form__controls">
                        <button class="btn btn--normal upper-text auth-form__controls-back" onclick="toggleForms(event)">trở lại</button>
                        <button class="btn btn--primary upper-text" onclick="registerUser()">đăng ký</button>
                    </div>
                    <div class="auth-form__sup">
                        <div class="auth-form__sup-text">
                            <div class="hr-bar"></div>
                            <div class="text-or upper-text">hoặc</div>
                            <div class="hr-bar"></div>
                        </div>
                        <div class="auth-form__sup-socials">
                            <a href="" class="auth-form__sup-socials--facebook btn btn--with--icon">
                                <i class="auth-form__sup-socials-icon fa-brands fa-square-facebook"></i>
                                <span class="auth-form__sup-socials-title">Facebook</span>
                            </a>
                            <a href="" class="auth-form__sup-socials--google btn btn--size-s btn--with--icon">
                                <i class="auth-form__sup-socials-icon fa-brands fa-google"></i>
                                <span class="auth-form__sup-socials-title">Google</span>
                            </a>
                        </div>
                    </div>
                    <div class="auth-form__aside">
                        <p class="auth-form__policy-text">
                            Bằng việc đăng kí, bạn đã đồng ý với LougiShop về
                            <a class="auth-form__text-link" href="">Điều khoản dịch vụ</a>
                            &amp;
                            <a class="auth-form__text-link" href="">Chính sách bảo mật</a>
                        </p>
                    </div>
                    <div class="auth-form__footer">
                        <div class="auth-form__footer-sup">
                            <span class="auth-form__footer-sup-text">Bạn đã có tài khoản?</span>
                            <a class="auth-form__login" href="" onclick="toggleForms(event)">Đăng nhập</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End Modal -->
</body>
</html>
<script src="./assets/js/initAdmin.js"></script>
<script>
function toggleForms(event) {
    event.preventDefault();

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginFormDisplay = window.getComputedStyle(loginForm).display;

    if (loginFormDisplay === 'none') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
    }
}

function togglePassword(passwordId, iconId) {
    const passwordField = document.getElementById(passwordId);
    const eyeIcon = document.getElementById(iconId);

    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
    } else {
        passwordField.type = 'password';
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
    }
}
const users = JSON.parse(localStorage.getItem('users')) || [];
console.log(users)
function loginUser() {
    const username = document.querySelector('.auth-form__input[placeholder="Email/Số điện thoại/Tên đăng nhập"]').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) {
        alert('Tên đăng nhập và mật khẩu không được để trống.');
        return;
    }

    // Lấy danh sách người dùng từ localStorage
    const users = JSON.parse(localStorage.getItem('users')) || [];

    // Tìm user phù hợp
    const user = users.find(u => (u.email === username || u.username === username) && u.password === password);

    if (user) {
        alert(`Đăng nhập thành công! Xin chào, ${user.fullname}`);
        localStorage.setItem('currentUser', JSON.stringify(user));

        // Điều hướng theo vai trò
        if (user.role === 'Admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'home.html';
        }
    } else {
        alert('Sai tên đăng nhập hoặc mật khẩu. Vui lòng thử lại.');
    }
}
document.querySelector('.btn.btn--primary.upper-text').addEventListener('click', loginUser);

function registerUser() {
    const emailInput = document.querySelector('.auth-form__input[placeholder="Email"]');
    const usernameInput = document.querySelector('.auth-form__input[placeholder="Tên đăng nhập"]');
    const passwordInput = document.getElementById('register-password');
    const confirmPasswordInput = document.getElementById('confirm-password');

    const email = emailInput.value.trim();
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    const confirmPassword = confirmPasswordInput.value.trim();

    if (!email || !username || !password || !confirmPassword) {
        alert("Vui lòng nhập đầy đủ thông tin.");
        return;
    }

    // Kiểm tra email phải có ký tự "@"
    if (!email.includes('@')) {
        alert("Email không hợp lệ. Vui lòng nhập email có chứa ký tự '@'.");
        emailInput.focus();
        return;
    }

    if (password !== confirmPassword) {
        alert("Mật khẩu xác nhận không khớp.");
        return;
    }

    // Lấy danh sách người dùng từ localStorage (nếu có)
    const users = JSON.parse(localStorage.getItem('users')) || [];

    // Kiểm tra trùng email hoặc tên đăng nhập
    if (users.some(user => user.email === email || user.username === username)) {
        alert("Email hoặc tên đăng nhập đã tồn tại. Vui lòng sử dụng thông tin khác.");
        return;
    }

    // Tạo user mới
    const newUser = {
        id: crypto.randomUUID(),
        email,
        username,
        fullname: username,
        password,
        phone: "Chưa cập nhật",
        role: "User",
        avatar: "./assets/img/user/userdefault.webp"
    };

    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));

    alert("Đăng ký thành công!");

    // Reset các trường input
    emailInput.value = "";
    usernameInput.value = "";
    passwordInput.value = "";
    confirmPasswordInput.value = "";
}


</script>
